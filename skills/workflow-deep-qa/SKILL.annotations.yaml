health_checker:
  type: AgentNode
  id: health_checker
  role: qa
  blocking: 'true'
  reads: []
  writes:
  - .factory/reviews/health-check.md
  edges_out:
  - target: gate_health
    condition: null
  slots:
    task_prompt_health_checker: 'Run the health check ONLY — do NOT perform code review
      or adversarial testing. Execute ''factory eval {project_path}'', parse the JSON
      output, extract the composite score and per-dimension breakdown. Compare against
      the baseline score (score_before). Calculate the delta, check threshold compliance.
      Write a structured report to .factory/reviews/health-check.md with a score table,
      composite score, delta, and threshold result. If eval fails completely (no valid
      score), report REVERT immediately.

      Write output to: .factory/reviews/health-check.md'
    timeout_health_checker: '1800'
gate_health:
  type: GateNode
  id: gate_health
  evaluator_type: agent
  evaluator_role: ceo
  reads:
  - .factory/reviews/health-check.md
  edges_out:
  - target: code_reviewer
    condition: PROCEED
  - target: post_review
    condition: HALT
  slots:
    gate_prompt_gate_health: Read health check results at .factory/reviews/health-check.md.
      If eval completely failed (no valid composite score), emit HALT — this triggers
      immediate REVERT, skipping code review and adversarial testing. If eval passed
      and composite score is valid, emit PROCEED. Do NOT RELOOP — health check is
      a deterministic measurement, no fix loop in deep-qa mode.
code_reviewer:
  type: AgentNode
  id: code_reviewer
  role: qa
  blocking: 'true'
  reads: []
  writes:
  - .factory/reviews/code-review.md
  edges_out:
  - target: gate_review
    condition: null
  slots:
    task_prompt_code_reviewer: 'Perform code review ONLY — do NOT run eval or adversarial
      testing. Get changed files via ''git diff --name-only <baseline>..HEAD'', then
      read each file''s diff individually via ''git diff <baseline>..HEAD -- <file>''.
      Do NOT run ''gh pr diff'' (too large). Evaluate against the 7-category checklist:
      correctness, security, edge cases, missing tests, style, scope compliance, guardrail
      compliance. Check spec fidelity via ''gh issue view <issue_number>''. Check
      plan completion against .factory/strategy/current.md. If research mode: verify
      no fixed_surfaces modified. Write structured results to .factory/reviews/code-review.md.

      Write output to: .factory/reviews/code-review.md'
    timeout_code_reviewer: '1800'
gate_review:
  type: GateNode
  id: gate_review
  evaluator_type: agent
  evaluator_role: ceo
  reads:
  - .factory/reviews/code-review.md
  edges_out:
  - target: adversarial_tester
    condition: PROCEED
  - target: post_review
    condition: HALT
  slots:
    gate_prompt_gate_review: Read code review results at .factory/reviews/code-review.md.
      Count critical issues in the Issues section (severity = [Critical]). If critical_count
      > 0, emit HALT — this triggers ISSUES_FOUND verdict, skipping adversarial testing.
      If critical_count == 0, emit PROCEED to adversarial testing. Do NOT RELOOP —
      no fix loop in deep-qa mode.
adversarial_tester:
  type: AgentNode
  id: adversarial_tester
  role: qa
  blocking: 'true'
  reads: []
  writes:
  - .factory/reviews/adversarial-qa.md
  edges_out:
  - target: gate_adversarial
    condition: null
  slots:
    task_prompt_adversarial_tester: 'Perform adversarial QA ONLY — do NOT re-run eval,
      lint, or type checking. Switch to skeptical user identity. Determine project
      type from factory.md and README.md (CLI/TUI/API/Library/Research/UI). Derive
      a test plan from acceptance criteria via ''gh issue view <issue_number>'' BEFORE
      executing. Run the smoke test from factory.md. Execute type-aware feature testing
      matching the detected project type. Verify all acceptance criteria. Check Builder''s
      claimed blockers. Write structured results to .factory/reviews/adversarial-qa.md
      with project type, test plan, smoke test result, feature tests, edge cases,
      acceptance criteria verification, and adversarial verdict (PASS/FAIL). When
      in doubt, FAIL — burden of proof is on the Builder.

      Write output to: .factory/reviews/adversarial-qa.md'
    timeout_adversarial_tester: '1800'
gate_adversarial:
  type: GateNode
  id: gate_adversarial
  evaluator_type: agent
  evaluator_role: ceo
  reads:
  - .factory/reviews/adversarial-qa.md
  edges_out:
  - target: join_verdict
    condition: PROCEED
  - target: post_review
    condition: HALT
  slots:
    gate_prompt_gate_adversarial: Read adversarial QA results at .factory/reviews/adversarial-qa.md.
      Check the Adversarial Verdict line at the bottom. If verdict is FAIL, emit HALT
      — this triggers FAIL verdict. If verdict is PASS, emit PROCEED to verdict synthesis.
      Do NOT RELOOP — adversarial tester is a one-shot evaluation in deep-qa mode.
join_verdict:
  type: FnNode
  id: join_verdict
  command: cat {project_path}/.factory/reviews/health-check.md {project_path}/.factory/reviews/code-review.md
    {project_path}/.factory/reviews/adversarial-qa.md > {project_path}/.factory/reviews/qa-latest.md
  reads:
  - .factory/reviews/adversarial-qa.md
  - .factory/reviews/code-review.md
  - .factory/reviews/health-check.md
  writes:
  - .factory/reviews/qa-latest.md
  edges_out:
  - target: gate_precheck
    condition: null
gate_precheck:
  type: GateNode
  id: gate_precheck
  evaluator_type: fn
  evaluator_command: factory precheck {project_path} --score-before 0 --score-after
    0
  reads:
  - .factory/reviews/qa-latest.md
  edges_out:
  - target: post_review
    condition: PROCEED
  - target: post_review
    condition: HALT
  slots:
    failure_action_gate_precheck: 'If gate fails: the change violated a constraint
      or score regressed. Route to `post_review` for error handling.'
post_review:
  type: FnNode
  id: post_review
  command: factory review --verdict $VERDICT --pr $PR_NUMBER --score-before $SCORE_BEFORE
    --score-after $SCORE_AFTER
  reads:
  - .factory/reviews/qa-latest.md
  writes: []
  edges_out: []
  slots:
    finalize_command_post_review: factory review --verdict $VERDICT --pr $PR_NUMBER
      --score-before $SCORE_BEFORE --score-after $SCORE_AFTER
