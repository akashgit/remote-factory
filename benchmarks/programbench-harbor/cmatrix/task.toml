schema_version = "1.3"

[task]
name = "programbench/cmatrix"
description = "Reverse-engineer cmatrix binary and produce equivalent source code"
authors = []
keywords = ["programbench", "reverse-engineering"]

[metadata]
difficulty = "hard"
category = "programming"
tags = ["binary", "reverse-engineering"]

[environment]
# ProgramBench rules: 'The agent MUST NOT have access to internet during inference.'
# Harbor's egress control (network_mode=allowlist) doesn't work on all environments
# (see https://github.com/harbor-framework/harbor/issues/2146).
# TODO: Implement Docker-native iptables restriction in run-programbench.sh:
#   1. Create restricted Docker network
#   2. Apply iptables rules allowing only Vertex AI (216.239.32.0/19) + Google OAuth
#   3. Block all other egress
# For now, using public network. The agent's tools (no WebSearch/WebFetch in
# bypassPermissions mode) provide partial restriction.
network_mode = "public"
build_timeout_sec = 900.0
cpus = 2
memory_mb = 4096
storage_mb = 10240
gpus = 0
mcp_servers = []

[environment.env]

[agent]
timeout_sec = 3600.0

[verifier]
timeout_sec = 300.0

[verifier.env]

[solution.env]
