schema_version = "1.3"

[task]
name = "programbench/cmatrix"
description = "Reverse-engineer cmatrix binary and produce equivalent source code"
authors = []
keywords = ["programbench", "reverse-engineering"]

[metadata]
difficulty = "hard"
category = "programming"
tags = ["binary", "reverse-engineering"]

[environment]
network_mode = "public"
build_timeout_sec = 900.0
cpus = 2
memory_mb = 4096
storage_mb = 10240
gpus = 0
mcp_servers = []

[environment.env]

[agent]
timeout_sec = 3600.0
network_mode = "allowlist"
allowed_hosts = [
    "api.anthropic.com",
    "us-east5-aiplatform.googleapis.com",
    "us-central1-aiplatform.googleapis.com",
    "europe-west1-aiplatform.googleapis.com",
    "oauth2.googleapis.com",
    "www.googleapis.com",
    "storage.googleapis.com",
    "metadata.google.internal",
    "sentry.io",
    "statsig.anthropic.com",
    "langfuse-ci.ai-innovation.team",
    "cloud.langfuse.com",
]

[verifier]
timeout_sec = 300.0

[verifier.env]

[solution.env]
