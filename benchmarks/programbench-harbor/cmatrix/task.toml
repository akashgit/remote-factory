schema_version = "1.3"

[task]
name = "programbench/cmatrix"
description = "Reverse-engineer cmatrix binary and produce equivalent source code"
authors = []
keywords = ["programbench", "reverse-engineering"]

[metadata]
difficulty = "hard"
category = "programming"
tags = ["binary", "reverse-engineering"]

[environment]
network_mode = "public"
build_timeout_sec = 900.0
cpus = 2
memory_mb = 4096
storage_mb = 10240
gpus = 0
mcp_servers = []

[environment.env]

[agent]
timeout_sec = 3600.0
# NOTE: network_mode should be 'allowlist' for production runs.
# Currently set to 'public' to verify E2E pipeline works.
# After a successful run, capture exact endpoints from Docker network logs
# and add them to allowed_hosts. See ProgramBench rules:
# 'The agent MUST NOT have access to internet during inference.'
# network_mode = "allowlist"
# allowed_hosts = ["api.anthropic.com", "us-east5-aiplatform.googleapis.com", ...]

[verifier]
timeout_sec = 300.0

[verifier.env]

[solution.env]
