<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Factory Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--border:#30363d;
  --text:#e6edf3;--text-dim:#7d8590;--accent:#58a6ff;
  --green:#3fb950;--red:#f85149;--yellow:#d29922;--cyan:#39d2e0;
  --role-ceo:#58a6ff;--role-researcher:#3fb950;--role-strategist:#d29922;
  --role-builder:#f0883e;--role-reviewer:#bc8cff;--role-evaluator:#f778ba;
  --role-archivist:#7d8590;--role-refiner:#39d2e0;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;font-size:14px;line-height:1.5}
header{padding:24px 32px;border-bottom:1px solid var(--border);background:var(--surface)}
.logo{font-weight:800;font-size:22px;letter-spacing:4px;color:var(--cyan)}
.subtitle{font-size:12px;color:var(--text-dim);margin-top:2px}
main{max-width:900px;margin:32px auto;padding:0 24px}
.section-title{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-dim);margin-bottom:12px}

.project-grid{display:flex;flex-direction:column;gap:12px}

.project-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px 20px;cursor:pointer;transition:border-color 0.15s,background 0.15s;text-decoration:none;color:inherit;display:block}
.project-card:hover{border-color:var(--accent);background:rgba(88,166,255,0.04)}

.project-card-header{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.project-name{font-weight:600;font-size:15px;flex:1}
.project-status{display:flex;align-items:center;gap:6px}
.cycle-count{font-size:12px;color:var(--text-dim);background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:1px 8px}

.project-cycles{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.cycle-chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg)}
.cycle-chip .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.cycle-chip .dot.completed{background:var(--green)}
.cycle-chip .dot.running{background:var(--yellow)}
.cycle-chip .dot.failed{background:var(--red)}
.cycle-chip-title{color:var(--text)}
.cycle-chip-meta{color:var(--text-dim)}

.role-mini{display:inline-block;padding:0 4px;border-radius:6px;font-size:9px;font-weight:600;color:#fff;text-transform:capitalize}

.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim)}
.empty-state h2{color:var(--text);margin-bottom:8px;font-size:16px;font-weight:600}
.empty-state code{background:var(--surface);border:1px solid var(--border);padding:2px 8px;border-radius:4px;font-size:12px}

.sse-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:8px}
.sse-dot.connected{background:var(--green)}
.sse-dot.disconnected{background:var(--text-dim)}
</style>
</head>
<body>
<header>
  <div class="logo">FACTORY</div>
  <div class="subtitle">Agent session dashboard<span class="sse-dot disconnected" id="sse-dot" title="SSE connection"></span></div>
</header>
<main>
  <div class="section-title">Projects</div>
  <div class="project-grid" id="project-grid">
    <div class="empty-state"><p>Loading projects...</p></div>
  </div>
</main>
<script>
var ROLE_COLORS = {
  ceo:'#58a6ff',researcher:'#3fb950',strategist:'#d29922',
  builder:'#f0883e',reviewer:'#bc8cff',evaluator:'#f778ba',
  archivist:'#7d8590',refiner:'#39d2e0'
};

function esc(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function formatCost(v) {
  if (!v) return '$0.00';
  return '$' + Number(v).toFixed(2);
}

function formatDuration(ms) {
  if (!ms) return '0s';
  var s = ms / 1000;
  if (s < 60) return Math.round(s) + 's';
  return Math.round(s / 60) + 'm ' + Math.round(s % 60) + 's';
}

function formatTime(ts) {
  if (!ts) return '';
  var d = new Date(ts * 1000);
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

function roleBadge(role) {
  var r = (role || 'unknown').toLowerCase();
  var color = ROLE_COLORS[r] || '#7d8590';
  return '<span class="role-mini" style="background:' + color + '">' + esc(r) + '</span>';
}

async function loadProjects() {
  var grid = document.getElementById('project-grid');
  try {
    var resp = await fetch('/api/projects');
    if (!resp.ok) { grid.innerHTML = '<div class="empty-state"><h2>Error loading projects</h2></div>'; return; }
    var projects = await resp.json();

    if (projects.length === 0) {
      grid.innerHTML = '<div class="empty-state"><h2>No Projects</h2><p>Run <code>factory ceo &lt;path&gt;</code> to create a project.</p></div>';
      return;
    }

    // Fetch cycles for each project in parallel
    var cyclePromises = projects.map(function(p) {
      return fetch('/api/projects/' + encodeURIComponent(p.name) + '/cycles?limit=5')
        .then(function(r) { return r.ok ? r.json() : []; })
        .catch(function() { return []; });
    });
    var allCycles = await Promise.all(cyclePromises);

    // Pair projects with their cycles, sort by most recent activity
    var paired = projects.map(function(p, i) {
      return { project: p, cycles: allCycles[i] };
    });
    paired.sort(function(a, b) {
      var aTime = a.cycles.length > 0 ? a.cycles[0].created_at : 0;
      var bTime = b.cycles.length > 0 ? b.cycles[0].created_at : 0;
      return bTime - aTime;
    });

    var html = '';
    paired.forEach(function(item) {
      var p = item.project;
      var cycles = item.cycles;
      var hasCycles = cycles.length > 0;

      html += '<a class="project-card" href="/sessions/' + encodeURIComponent(p.name) + '">';
      html += '<div class="project-card-header">';
      html += '<span class="project-name">' + esc(p.name) + '</span>';
      if (hasCycles) {
        html += '<span class="cycle-count">' + cycles.length + ' cycle' + (cycles.length !== 1 ? 's' : '') + '</span>';
      } else {
        html += '<span class="cycle-count" style="color:var(--text-dim)">no sessions</span>';
      }
      html += '</div>';

      if (hasCycles) {
        html += '<div class="project-cycles">';
        cycles.forEach(function(c) {
          var title = c.title || formatTime(c.created_at) || 'Cycle';
          var statusCls = c.status || 'completed';
          var roles = c.child_roles ? c.child_roles.split(',') : [];
          html += '<div class="cycle-chip">';
          html += '<span class="dot ' + esc(statusCls) + '"></span>';
          html += '<span class="cycle-chip-title">' + esc(title) + '</span>';
          roles.forEach(function(r) { html += roleBadge(r); });
          html += '<span class="cycle-chip-meta">' + formatCost(c.total_cost) + '</span>';
          html += '<span class="cycle-chip-meta">' + formatDuration(c.total_duration) + '</span>';
          html += '</div>';
        });
        html += '</div>';
      }

      html += '</a>';
    });

    grid.innerHTML = html;
  } catch (e) {
    grid.innerHTML = '<div class="empty-state"><h2>Error</h2><p>' + esc(e.message) + '</p></div>';
  }
}

// SSE for live updates
function connectSSE() {
  var dot = document.getElementById('sse-dot');
  var evtSource = new EventSource('/api/events/stream');
  evtSource.onopen = function() { dot.className = 'sse-dot connected'; dot.title = 'Connected'; };
  evtSource.onmessage = function() { loadProjects(); };
  evtSource.onerror = function() { dot.className = 'sse-dot disconnected'; dot.title = 'Reconnecting...'; };
}

loadProjects();
connectSSE();
</script>
</body>
</html>
