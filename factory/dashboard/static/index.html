<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #7d8590;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --cyan: #39d2e0;
    --font: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
  }

  header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    gap: 24px;
  }

  .logo {
    color: var(--cyan);
    font-weight: 800;
    font-size: 26px;
    letter-spacing: 6px;
    text-transform: uppercase;
  }

  .header-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding-bottom: 2px;
  }

  .header-info .subtitle {
    color: var(--text-dim);
    font-size: 12px;
  }

  .header-info .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  .dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.idle { background: var(--text-dim); }

  main {
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: auto auto auto auto 1fr 1fr;
    gap: 0;
    height: calc(100vh - 80px);
  }

  .panel {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .panel-header {
    padding: 10px 16px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .panel-body {
    padding: 8px;
    overflow-y: auto;
    flex: 1;
  }

  /* Projects panel — spans content rows below pipeline/agent bars */
  .projects-panel {
    grid-row: 5 / 7;
  }

  /* Events panel — top right of content area */
  .events-panel {
    grid-column: 2;
    grid-row: 5;
  }

  /* Experiments panel — bottom right */
  .experiments-panel {
    grid-column: 2;
    grid-row: 6;
    border-bottom: none;
  }

  /* Project cards */
  .project-card {
    padding: 12px;
    margin-bottom: 4px;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: background 0.15s, border-color 0.15s;
  }

  .project-card:hover {
    background: var(--surface);
    border-color: var(--border);
  }

  .project-card.selected {
    background: var(--surface);
    border-color: var(--accent);
  }

  .project-name {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .project-goal {
    color: var(--text-dim);
    font-size: 11px;
    margin-bottom: 8px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .project-stats {
    display: flex;
    gap: 12px;
    font-size: 11px;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .stat-label { color: var(--text-dim); }
  .stat-value { font-weight: 600; }
  .stat-value.score { color: var(--accent); }
  .stat-value.keep { color: var(--green); }
  .stat-value.revert { color: var(--red); }

  /* Event stream */
  .event-item {
    padding: 6px 12px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .event-time {
    color: var(--text-dim);
    flex-shrink: 0;
    font-size: 11px;
    padding-top: 1px;
  }

  .event-badge {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    font-weight: 600;
    flex-shrink: 0;
    text-transform: uppercase;
  }

  .event-badge.agent-started { background: #1f3a5f; color: var(--accent); }
  .event-badge.agent-completed { background: #1a3a2a; color: var(--green); }
  .event-badge.agent-failed { background: #3d1f1f; color: var(--red); }
  .event-badge.agent-timeout { background: #3d2e1f; color: var(--yellow); }
  .event-badge.experiment-begin { background: #2a2040; color: #b392f0; }
  .event-badge.experiment-finalize { background: #2a2040; color: #b392f0; }
  .event-badge.cycle-started { background: #1f3a3a; color: var(--cyan); }
  .event-badge.cycle-completed { background: #1f3a3a; color: var(--cyan); }
  .event-badge.detect { background: #1f2d3a; color: #79c0ff; }
  .event-badge.discover-started { background: #1f2d3a; color: #79c0ff; }
  .event-badge.discover-completed { background: #1a3a2a; color: var(--green); }
  .event-badge.eval-started { background: #2d2a1f; color: var(--yellow); }
  .event-badge.eval-completed { background: #2d2a1f; color: var(--yellow); }
  .event-badge.guard-completed { background: #1f3a2a; color: var(--green); }
  .event-badge.study-started { background: #2a1f3a; color: #d2a8ff; }
  .event-badge.study-completed { background: #2a1f3a; color: #d2a8ff; }
  .event-badge.insights-started { background: #2a1f3a; color: #d2a8ff; }
  .event-badge.insights-completed { background: #2a1f3a; color: #d2a8ff; }
  .event-badge.ace-started { background: #3a1f2a; color: #ff7eb6; }
  .event-badge.ace-completed { background: #3a1f2a; color: #ff7eb6; }
  .event-badge.archive-completed { background: #1f3a3a; color: var(--cyan); }

  .event-text {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .event-project {
    color: var(--accent);
    font-weight: 600;
  }

  /* Experiments table */
  .exp-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  .exp-table th {
    text-align: left;
    padding: 6px 10px;
    color: var(--text-dim);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
  }

  .exp-table td {
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
  }

  .verdict-keep { color: var(--green); font-weight: 600; }
  .verdict-revert { color: var(--red); font-weight: 600; }
  .verdict-error { color: var(--yellow); font-weight: 600; }

  .delta-positive { color: var(--green); }
  .delta-negative { color: var(--red); }

  .empty-state {
    padding: 24px;
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
  }

  /* Score color helpers */
  .score-green { color: var(--green); }
  .score-yellow { color: var(--yellow); }
  .score-red { color: var(--red); }

  .score-clickable { cursor: pointer; }
  .score-clickable:hover { text-decoration: underline; }

  /* KPI strip */
  .kpi-strip {
    grid-column: 1 / -1;
    display: flex;
    gap: 16px;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .kpi-card {
    flex: 1;
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
  }
  .kpi-value {
    font-size: 24px;
    font-weight: 800;
    line-height: 1.2;
  }
  .kpi-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .kpi-bar {
    display: flex;
    height: 4px;
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
  }
  .kpi-bar-keep { background: var(--green); }
  .kpi-bar-revert { background: var(--red); }

  /* Modal overlay */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
  }

  .modal-content {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; max-width: 500px; width: 90%;
    position: relative;
  }

  .modal-close {
    position: absolute; top: 12px; right: 16px;
    background: none; border: none; color: var(--text-dim);
    font-size: 20px; cursor: pointer; line-height: 1;
  }

  .modal-close:hover { color: var(--text); }

  .modal-title {
    font-size: 16px; font-weight: 700; margin-bottom: 4px;
    color: var(--accent);
  }

  .modal-score {
    font-size: 28px; font-weight: 800; margin-bottom: 16px;
  }

  .modal-chart-wrap {
    width: 100%; max-width: 420px; margin: 0 auto;
  }

  /* View toggle */
  .view-toggle {
    float: right;
    display: inline-flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .toggle-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    padding: 2px 10px;
    font-size: 10px;
    font-family: var(--font);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .toggle-btn.active {
    background: var(--accent);
    color: var(--bg);
  }
  .toggle-btn:hover:not(.active) {
    background: var(--surface);
  }

  /* Pipeline phase bar */
  .pipeline-bar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 0;
    padding: 8px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    overflow-x: auto;
  }
  .phase-step {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    color: var(--text-dim);
    border-radius: 4px;
    white-space: nowrap;
  }
  .phase-step.completed { color: var(--green); }
  .phase-step.active {
    color: var(--bg);
    background: var(--accent);
  }
  .phase-step.clickable { cursor: pointer; }
  .phase-step.clickable:hover { background: rgba(88,166,255,0.15); }
  .phase-step.active.clickable:hover { filter: brightness(1.15); }
  .phase-step.selected-phase { outline: 2px solid var(--accent); outline-offset: 2px; }
  .phase-arrow {
    color: var(--border);
    font-size: 14px;
    flex-shrink: 0;
    margin: 0 2px;
  }

  /* Agent activity cards */
  .agent-cards {
    grid-column: 1 / -1;
    display: flex;
    gap: 8px;
    padding: 8px 24px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    min-height: 0;
  }
  .agent-cards:empty { display: none; }
  .agent-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    cursor: pointer;
    flex-shrink: 0;
    transition: border-color 0.15s;
    animation: fadeIn 0.3s ease;
  }
  .agent-card:hover { border-color: var(--accent); }
  .agent-card .pulse-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 1.5s infinite;
    flex-shrink: 0;
  }
  .agent-card.done .pulse-dot {
    background: var(--text-dim);
    animation: none;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(63,185,80,0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(63,185,80,0); }
  }
  .agent-role {
    font-weight: 700;
    font-size: 12px;
    text-transform: capitalize;
  }
  .agent-task {
    color: var(--text-dim);
    font-size: 11px;
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .agent-timer {
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    flex-shrink: 0;
  }

  /* Phase detail row */
  .phase-detail-row {
    grid-column: 1 / -1;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    padding: 0;
    display: none;
    max-height: 50vh;
    overflow-y: auto;
  }
  .phase-detail-row.open { display: block; padding: 16px 24px; animation: fadeIn 0.3s ease; }
  .phase-detail-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .phase-detail-title {
    font-size: 16px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .verdict-badge {
    font-size: 10px;
    padding: 2px 10px;
    border-radius: 4px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .verdict-badge.proceed { background: #1a3a2a; color: var(--green); }
  .verdict-badge.redirect { background: #3d2e1f; color: var(--yellow); }
  .verdict-badge.abort { background: #3d1f1f; color: var(--red); }
  .phase-detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .phase-detail-section { margin-bottom: 12px; }
  .phase-detail-section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }
  .phase-detail-pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    font-size: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 250px;
    overflow-y: auto;
  }
  .phase-detail-kv {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 4px 12px;
    font-size: 12px;
  }
  .phase-detail-kv dt { color: var(--text-dim); font-weight: 600; }
  .phase-detail-kv dd { color: var(--text); }
  .phase-detail-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .phase-detail-table th {
    text-align: left;
    padding: 4px 8px;
    color: var(--text-dim);
    font-size: 11px;
    border-bottom: 1px solid var(--border);
  }
  .phase-detail-table td { padding: 4px 8px; border-bottom: 1px solid var(--border); }
  .score-bar-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .score-bar {
    height: 8px;
    border-radius: 4px;
    background: var(--border);
    flex: 1;
    max-width: 120px;
  }
  .score-bar-fill { height: 100%; border-radius: 4px; }
  .collapsible-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 12px;
    font-size: 11px;
    font-family: var(--font);
    cursor: pointer;
    border-radius: 4px;
    margin-top: 8px;
  }
  .collapsible-toggle:hover { background: var(--surface); color: var(--text); }

  /* Project info button */
  .project-info-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 11px;
    font-family: var(--font);
    padding: 1px 6px;
    border-radius: 3px;
    cursor: pointer;
    margin-left: auto;
  }
  .project-info-btn:hover { background: var(--surface); color: var(--accent); }

  /* Project status badges */
  .project-status-badge {
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 3px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .project-status-badge.ready { background: #1a3a2a; color: var(--green); }
  .project-status-badge.new { background: #1f3a5f; color: var(--accent); }
  .project-status-badge.discovering { background: #2d2a1f; color: var(--yellow); }
  .project-status-badge.pending_review { background: #2a1f3a; color: #d2a8ff; }

  /* Mode indicator badge */
  .mode-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    background: #1f3a5f;
    color: var(--accent);
    vertical-align: middle;
  }

  /* Agent output slide-out panel */
  .agent-output-panel {
    position: fixed;
    top: 0;
    right: -420px;
    width: 420px;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 900;
    display: flex;
    flex-direction: column;
    transition: right 0.25s ease;
  }
  .agent-output-panel.open { right: 0; }
  .agent-output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .agent-output-title {
    font-weight: 700;
    font-size: 14px;
    text-transform: capitalize;
  }
  .agent-output-close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
  }
  .agent-output-close:hover { color: var(--text); }
  .agent-output-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    font-size: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Event type filters */
  .event-filters {
    display: flex;
    gap: 4px;
    padding: 6px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 2px 10px;
    font-size: 10px;
    font-family: var(--font);
    cursor: pointer;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .filter-btn.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  .filter-btn:hover:not(.active) { background: rgba(88,166,255,0.1); }

  /* Responsive */
  @media (max-width: 800px) {
    main {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto auto auto auto auto auto;
    }
    .kpi-strip { flex-wrap: wrap; }
    .kpi-card { min-width: calc(50% - 12px); }
    .pipeline-bar { flex-wrap: wrap; }
    .agent-cards { flex-wrap: wrap; }
    .projects-panel { max-height: 200px; }
    .events-panel { max-height: 50vh; }
    .experiments-panel { max-height: 50vh; }
    .agent-output-panel { width: 100%; right: -100%; }
    .phase-detail-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">FACTORY</div>
  <div class="header-info">
    <div class="subtitle">Multi-Agent Software Evolution</div>
    <div class="status">
      <span class="dot" id="stream-dot"></span>
      <span id="stream-status">Connecting...</span>
    </div>
  </div>
</header>

<main>
  <div class="kpi-strip" id="kpi-strip"></div>

  <div class="pipeline-bar" id="pipeline-bar"></div>

  <div class="phase-detail-row" id="phase-detail-row"></div>

  <div class="agent-cards" id="agent-cards"></div>

  <div class="panel projects-panel">
    <div class="panel-header">Projects</div>
    <div class="panel-body" id="projects-list">
      <div class="empty-state">Loading...</div>
    </div>
  </div>

  <div class="panel events-panel">
    <div class="panel-header">Live Events</div>
    <div class="event-filters" id="event-filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="agents">Agents</button>
      <button class="filter-btn" data-filter="evals">Evals</button>
      <button class="filter-btn" data-filter="experiments">Experiments</button>
      <button class="filter-btn" data-filter="system">System</button>
    </div>
    <div class="panel-body" id="events-list">
      <div class="empty-state">Waiting for events...</div>
    </div>
  </div>

  <div class="panel experiments-panel">
    <div class="panel-header">
      Experiments <span id="exp-project-name"></span>
      <div class="view-toggle" id="view-toggle">
        <button class="toggle-btn active" data-view="table">Table</button>
        <button class="toggle-btn" data-view="chart">Chart</button>
      </div>
    </div>
    <div class="panel-body" id="experiments-list">
      <div class="empty-state">Select a project to view experiments</div>
    </div>
    <div class="panel-body" id="chart-container" style="display:none;height:300px">
      <canvas id="score-chart"></canvas>
    </div>
  </div>
</main>

<div class="agent-output-panel" id="agent-output-panel">
  <div class="agent-output-header">
    <span class="agent-output-title" id="agent-output-title"></span>
    <button class="agent-output-close" onclick="closeAgentOutput()">&times;</button>
  </div>
  <div class="agent-output-body" id="agent-output-body"></div>
</div>

<script>
let selectedProject = null;
let eventCount = 0;
let expandedPhase = null;
let currentPhaseGlobal = null;

// ── Projects ──
async function loadProjects() {
  try {
    const res = await fetch('/api/projects');
    const projects = await res.json();
    renderProjects(projects);
    // Auto-select first project
    if (projects.length > 0 && !selectedProject) {
      selectProject(projects[0].name);
    }
  } catch (e) {
    document.getElementById('projects-list').innerHTML =
      '<div class="empty-state">Failed to load projects</div>';
  }
}

function renderProjects(projects) {
  const el = document.getElementById('projects-list');
  if (projects.length === 0) {
    el.innerHTML = '<div class="empty-state">No factory projects found</div>';
    return;
  }

  el.innerHTML = projects.map(p => {
    const scores = p.scores || [];
    const spark = sparkline(scores);
    const scoreHtml = p.latest_score != null
      ? `<div class="stat"><span class="stat-label">Score</span><span class="stat-value score-clickable ${scoreColorClass(p.latest_score)}" onclick="event.stopPropagation(); openDimensionModal('${p.name}', ${p.latest_score})">${p.latest_score.toFixed(3)}</span>${spark}</div>`
      : '';
    return `
    <div class="project-card ${p.name === selectedProject ? 'selected' : ''}"
         onclick="selectProject('${p.name}')">
      <div class="project-name">
        <span class="dot ${p.active ? 'live' : 'idle'}"></span>
        ${esc(p.name)}
        ${p.name === selectedProject && currentMode ? `<span class="mode-badge">${esc(currentMode)}</span>` : ''}
        <button class="project-info-btn" onclick="event.stopPropagation(); window.location.href='/sessions/${encodeURIComponent(p.name)}'" title="Agent sessions">sessions</button>
        <button class="project-info-btn" onclick="event.stopPropagation(); openProjectDetails('${esc(p.name)}')" title="Project details">info</button>
      </div>
      ${p.goal ? `<div class="project-goal">${esc(p.goal)}</div>` : ''}
      <div class="project-stats">
        ${scoreHtml}
        <div class="stat"><span class="stat-label">Exp</span><span class="stat-value">${p.experiment_count}</span></div>
        <div class="stat"><span class="stat-value keep">${p.keep_count}K</span></div>
        <div class="stat"><span class="stat-value revert">${p.revert_count}R</span></div>
      </div>
    </div>`;
  }).join('');
}

async function selectProject(name) {
  selectedProject = name;
  if (expandedPhase) {
    expandedPhase = null;
    document.getElementById('phase-detail-row').classList.remove('open');
    document.getElementById('phase-detail-row').innerHTML = '';
  }
  loadProjects();
  loadExperiments(name);
  loadLiveState();
}

// ── Experiments ──
async function loadExperiments(name) {
  document.getElementById('exp-project-name').textContent = `— ${name}`;
  try {
    const res = await fetch(`/api/projects/${name}/history`);
    const rows = await res.json();
    renderExperiments(rows);
    if (isChartViewActive()) {
      renderScoreChart(rows);
    }
  } catch (e) {
    document.getElementById('experiments-list').innerHTML =
      '<div class="empty-state">Failed to load experiments</div>';
  }
}

function renderExperiments(rows) {
  const el = document.getElementById('experiments-list');
  if (rows.length === 0) {
    el.innerHTML = '<div class="empty-state">No experiments recorded</div>';
    return;
  }

  // Reverse to show newest first
  const sorted = [...rows].reverse();

  el.innerHTML = `<table class="exp-table">
    <thead><tr>
      <th>ID</th><th>Verdict</th><th>Delta</th><th>Score</th><th>Hypothesis</th>
    </tr></thead>
    <tbody>${sorted.map(r => {
      const delta = r.delta ? parseFloat(r.delta) : null;
      const deltaStr = delta != null ? (delta >= 0 ? '+' : '') + delta.toFixed(4) : '—';
      const deltaClass = delta != null ? (delta >= 0 ? 'delta-positive' : 'delta-negative') : '';
      const verdictClass = 'verdict-' + (r.verdict || 'error');
      const score = r.score_after ? parseFloat(r.score_after).toFixed(3) : '—';
      return `<tr>
        <td>${r.id}</td>
        <td class="${verdictClass}">${r.verdict}</td>
        <td class="${deltaClass}">${deltaStr}</td>
        <td>${score}</td>
        <td>${esc((r.hypothesis || '').substring(0, 60))}</td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

// ── Events SSE ──
function connectSSE() {
  const evtSource = new EventSource('/api/events/stream');
  const dot = document.getElementById('stream-dot');
  const status = document.getElementById('stream-status');

  evtSource.onopen = () => {
    dot.className = 'dot live';
    status.textContent = 'Connected';
  };

  evtSource.onmessage = (e) => {
    try {
      const event = JSON.parse(e.data);
      addEvent(event);
      // Refresh projects and summary on every event
      loadProjects();
      loadSummary();
      // Refresh experiments if the event is for the selected project
      if (selectedProject && event.project === selectedProject) {
        loadExperiments(selectedProject);
      }
    } catch (err) {
      console.error('Failed to parse event:', err);
    }
  };

  evtSource.onerror = () => {
    dot.className = 'dot idle';
    status.textContent = 'Reconnecting...';
  };
}

function addEvent(event) {
  const el = document.getElementById('events-list');
  // Remove empty state
  const empty = el.querySelector('.empty-state');
  if (empty) empty.remove();

  const ts = new Date(event.timestamp);
  const timeStr = ts.toLocaleTimeString('en-US', { hour12: false });
  const badgeClass = (event.type || '').replace(/\./g, '-');

  const desc = formatEventDesc(event);

  const div = document.createElement('div');
  div.className = 'event-item';
  div.dataset.eventType = event.type || '';
  div.innerHTML = `
    <span class="event-time">${timeStr}</span>
    <span class="event-badge ${badgeClass}">${esc(event.type)}</span>
    <span class="event-text">
      <span class="event-project">${esc(event.project)}</span>
      ${desc}
    </span>
  `;

  if (!eventMatchesFilter(event.type || '')) {
    div.style.display = 'none';
  }

  el.insertBefore(div, el.firstChild);

  // Cap at 200 events in DOM
  while (el.children.length > 200) {
    el.removeChild(el.lastChild);
  }
}

function formatEventDesc(event) {
  const d = event.data || {};
  const t = event.type || '';
  if (event.agent) {
    if (t === 'agent.completed') {
      return ` ${esc(event.agent)} finished (exit ${d.return_code ?? '?'})`;
    }
    return ` ${esc(event.agent)} — ${esc(d.task || '').substring(0, 60)}`;
  }
  if (t === 'detect') return ` state → ${esc(d.state)}`;
  if (t === 'discover.started') return ' introspecting project…';
  if (t === 'discover.completed') {
    return ` ${esc(d.language || '?')}/${esc(d.framework || '?')} — ${(d.dimensions || []).length} dimensions`;
  }
  if (t === 'eval.started') return ` running: ${esc((d.command || '').substring(0, 40))}`;
  if (t === 'eval.completed') {
    const s = d.composite != null ? d.composite.toFixed(3) : '?';
    return ` score=${s} ${d.passed ? '✓' : '✗'} (${d.dimensions} dims)`;
  }
  if (t === 'guard.completed') return d.clean ? ' clean' : ` ${d.violations} violation(s)`;
  if (t === 'experiment.begin') return ` #${d.exp_id} ${esc((d.hypothesis || '').substring(0, 60))}`;
  if (t === 'experiment.finalize') return ` #${d.exp_id} → ${d.verdict}`;
  if (t === 'study.started') return ' analyzing code…';
  if (t === 'study.completed') return ` ${d.chars} chars written`;
  if (t === 'insights.started') return ' cross-project analysis…';
  if (t === 'insights.completed') return ` ${d.projects_analyzed} projects, ${d.total_experiments} experiments`;
  if (t === 'ace.started') return d.dry_run ? ' (dry run)' : ' evolving playbooks…';
  if (t === 'ace.completed') return ` ${(d.roles_updated || []).length} roles updated`;
  if (t === 'archive.completed') return ` ${d.experiments} experiments → vault`;
  if (d.hypothesis) return ` ${esc(d.hypothesis.substring(0, 60))}`;
  if (d.verdict) return ` #${d.exp_id} ${d.verdict}`;
  if (d.mode) return ` mode=${esc(d.mode)}`;
  return '';
}

function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ── Sparklines ──
function sparkline(scores) {
  if (scores.length < 2) return '';
  const w = 60, h = 20;
  const min = Math.min(...scores), max = Math.max(...scores);
  const range = max - min || 1;
  const points = scores.map((s, i) =>
    `${(i / (scores.length - 1)) * w},${h - ((s - min) / range) * h}`
  ).join(' ');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="vertical-align:middle;margin-left:8px"><polyline points="${points}" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"/></svg>`;
}

// ── Score color ──
function scoreColorClass(score) {
  if (score >= 0.8) return 'score-green';
  if (score >= 0.6) return 'score-yellow';
  return 'score-red';
}

function scoreColor(score) {
  if (score >= 0.8) return 'var(--green)';
  if (score >= 0.6) return 'var(--yellow)';
  return 'var(--red)';
}

// ── Dimension radar modal ──
let radarChartInstance = null;

function openDimensionModal(projectName, compositeScore) {
  // Remove existing modal if any
  closeModal();

  fetch(`/api/projects/${projectName}/dimensions`)
    .then(res => res.json())
    .then(data => {
      const dims = data.dimensions || [];
      if (dims.length === 0) {
        return; // No data to show
      }
      renderModal(projectName, compositeScore, dims);
    })
    .catch(err => console.error('Failed to load dimensions:', err));
}

function renderModal(projectName, compositeScore, dims) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'dimension-modal';
  overlay.onclick = (e) => { if (e.target === overlay) closeModal(); };

  const hygieneNames = ['tests', 'lint', 'type_check', 'coverage', 'guard_patterns', 'config_parser'];

  overlay.innerHTML = `
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <div class="modal-title">${esc(projectName)}</div>
      <div class="modal-score" style="color: ${scoreColor(compositeScore)}">${compositeScore.toFixed(3)}</div>
      <div class="modal-chart-wrap">
        <canvas id="radar-chart"></canvas>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  // Build radar chart
  const labels = dims.map(d => d.name);
  const scores = dims.map(d => d.score);
  const bgColors = dims.map(d =>
    hygieneNames.includes(d.name) ? 'rgba(88,166,255,0.15)' : 'rgba(63,185,80,0.15)'
  );
  const borderColors = dims.map(d =>
    hygieneNames.includes(d.name) ? 'rgba(88,166,255,0.8)' : 'rgba(63,185,80,0.8)'
  );

  const ctx = document.getElementById('radar-chart').getContext('2d');
  radarChartInstance = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'Hygiene',
          data: dims.map(d => hygieneNames.includes(d.name) ? d.score : null),
          backgroundColor: 'rgba(88,166,255,0.15)',
          borderColor: 'rgba(88,166,255,0.8)',
          borderWidth: 2,
          pointBackgroundColor: 'rgba(88,166,255,1)',
          pointRadius: 3,
          spanGaps: false,
        },
        {
          label: 'Growth',
          data: dims.map(d => !hygieneNames.includes(d.name) ? d.score : null),
          backgroundColor: 'rgba(63,185,80,0.15)',
          borderColor: 'rgba(63,185,80,0.8)',
          borderWidth: 2,
          pointBackgroundColor: 'rgba(63,185,80,1)',
          pointRadius: 3,
          spanGaps: false,
        },
      ],
    },
    options: {
      responsive: true,
      scales: {
        r: {
          min: 0,
          max: 1,
          ticks: {
            stepSize: 0.2,
            color: 'rgba(125,133,144,0.6)',
            backdropColor: 'transparent',
          },
          grid: {
            color: 'rgba(48,54,61,0.6)',
          },
          angleLines: {
            color: 'rgba(48,54,61,0.6)',
          },
          pointLabels: {
            color: '#e6edf3',
            font: { size: 10, family: 'var(--font)' },
          },
        },
      },
      plugins: {
        legend: {
          labels: {
            color: '#e6edf3',
            font: { size: 11 },
          },
        },
      },
    },
  });
}

function closeModal() {
  const existing = document.getElementById('dimension-modal');
  if (existing) {
    if (radarChartInstance) {
      radarChartInstance.destroy();
      radarChartInstance = null;
    }
    existing.remove();
  }
}

// Close modal/panels on Escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeModal();
    closeAgentOutput();
    if (expandedPhase) {
      expandedPhase = null;
      document.getElementById('phase-detail-row').classList.remove('open');
      document.getElementById('phase-detail-row').innerHTML = '';
      renderPipelineBar(currentPhaseGlobal);
    }
  }
});

// ── Score History Chart ──
let scoreChartInstance = null;

function renderScoreChart(rows) {
  if (scoreChartInstance) {
    scoreChartInstance.destroy();
    scoreChartInstance = null;
  }

  if (rows.length === 0) return;

  const hygieneNames = ['tests', 'lint', 'type_check', 'coverage', 'guard_patterns', 'config_parser'];

  const labels = rows.map(r => `#${r.id}`);
  const composites = rows.map(r => r.score_after ? parseFloat(r.score_after) : null);

  const hygieneAvgs = rows.map(r => {
    const dims = r.dimensions || [];
    const hyg = dims.filter(d => hygieneNames.includes(d.name));
    return hyg.length > 0 ? hyg.reduce((sum, d) => sum + d.score, 0) / hyg.length : null;
  });

  const growthAvgs = rows.map(r => {
    const dims = r.dimensions || [];
    const growth = dims.filter(d => !hygieneNames.includes(d.name));
    return growth.length > 0 ? growth.reduce((sum, d) => sum + d.score, 0) / growth.length : null;
  });

  const pointColors = rows.map(r => {
    if (r.verdict === 'keep') return '#3fb950';
    if (r.verdict === 'revert') return '#f85149';
    return '#d29922';
  });

  const ctx = document.getElementById('score-chart').getContext('2d');
  scoreChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Composite',
          data: composites,
          borderColor: 'rgba(88,166,255,1)',
          backgroundColor: 'rgba(88,166,255,0.1)',
          borderWidth: 2.5,
          pointBackgroundColor: pointColors,
          pointRadius: 5,
          pointHoverRadius: 7,
          fill: false,
          tension: 0.2,
        },
        {
          label: 'Hygiene Avg',
          data: hygieneAvgs,
          borderColor: 'rgba(88,166,255,0.4)',
          borderWidth: 1.5,
          borderDash: [4, 2],
          pointRadius: 0,
          fill: false,
          tension: 0.2,
        },
        {
          label: 'Growth Avg',
          data: growthAvgs,
          borderColor: 'rgba(63,185,80,0.4)',
          borderWidth: 1.5,
          borderDash: [4, 2],
          pointRadius: 0,
          fill: false,
          tension: 0.2,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: {
          min: 0, max: 1,
          ticks: { color: 'rgba(125,133,144,0.6)', stepSize: 0.2 },
          grid: { color: 'rgba(48,54,61,0.6)' },
        },
        x: {
          ticks: { color: 'rgba(125,133,144,0.6)', font: { size: 10 } },
          grid: { display: false },
        },
      },
      plugins: {
        legend: {
          labels: { color: '#e6edf3', font: { size: 11 } },
        },
        tooltip: {
          callbacks: {
            afterLabel: function(ctx) {
              const row = rows[ctx.dataIndex];
              const parts = [];
              if (row.hypothesis) parts.push(row.hypothesis.substring(0, 40));
              if (row.delta) parts.push('delta: ' + row.delta);
              if (row.verdict) parts.push('verdict: ' + row.verdict);
              return parts.join('\n');
            },
          },
        },
      },
    },
  });
}

function initToggle() {
  document.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const view = btn.dataset.view;
      document.getElementById('experiments-list').style.display = view === 'table' ? '' : 'none';
      document.getElementById('chart-container').style.display = view === 'chart' ? '' : 'none';
      if (view === 'chart' && selectedProject) {
        loadChartData(selectedProject);
      }
    });
  });
}

async function loadChartData(name) {
  try {
    const res = await fetch(`/api/projects/${name}/history`);
    const rows = await res.json();
    renderScoreChart(rows);
  } catch (e) {
    console.error('Failed to load chart data:', e);
  }
}

function isChartViewActive() {
  const active = document.querySelector('.toggle-btn.active');
  return active && active.dataset.view === 'chart';
}

// ── KPI Summary ──
async function loadSummary() {
  try {
    const res = await fetch('/api/summary');
    const data = await res.json();
    renderKPIs(data);
  } catch (e) {
    console.error('Failed to load summary:', e);
  }
}

function renderKPIs(data) {
  const el = document.getElementById('kpi-strip');
  const keepPct = data.total_experiments > 0
    ? ((data.keep_count / data.total_experiments) * 100).toFixed(0)
    : '0';
  const keepBarW = data.total_experiments > 0
    ? (data.keep_count / data.total_experiments * 100)
    : 0;

  el.innerHTML = `
    <div class="kpi-card">
      <div class="kpi-label">Projects</div>
      <div class="kpi-value">${data.total_projects}
        <span style="font-size:12px;color:var(--green)">${data.active_projects} active</span>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Avg Score</div>
      <div class="kpi-value" style="color:${scoreColor(data.avg_score)}">${data.avg_score != null ? data.avg_score.toFixed(3) : '\u2014'}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Experiments</div>
      <div class="kpi-value">${data.total_experiments}</div>
      <div class="kpi-bar">
        <div class="kpi-bar-keep" style="width:${keepBarW}%"></div>
        <div class="kpi-bar-revert" style="width:${100 - keepBarW}%"></div>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Keep Rate</div>
      <div class="kpi-value" style="color:${scoreColor(data.keep_rate)}">${keepPct}%</div>
    </div>
  `;
}

// ── Pipeline Phase Bar ──
let currentPhases = ['Detect', 'Discover', 'Research', 'Strategize', 'Build', 'Review', 'Eval', 'Archive'];
let currentLoopPhases = [];
let currentHypothesisNumber = 0;

function isLoopPhase(phase) {
  return currentLoopPhases.includes(phase);
}

function renderPipelineBar(currentPhase) {
  const el = document.getElementById('pipeline-bar');
  const phases = currentPhases;
  const phaseIdx = currentPhase ? phases.indexOf(currentPhase) : -1;
  el.innerHTML = phases.map((p, i) => {
    let cls = 'phase-step';
    let clickable = false;
    if (i < phaseIdx) { cls += ' completed'; clickable = true; }
    else if (i === phaseIdx) { cls += ' active'; clickable = true; }
    if (clickable) cls += ' clickable';
    if (p === expandedPhase) cls += ' selected-phase';
    const check = i < phaseIdx ? '&#10003; ' : '';
    const onclick = clickable ? ` onclick="togglePhaseDetail('${p}')"` : '';
    const arrow = i < phases.length - 1 ? '<span class="phase-arrow">&#9656;</span>' : '';
    let label = esc(p);
    if (currentHypothesisNumber > 0 && isLoopPhase(p) && i >= phaseIdx && phaseIdx >= 0) {
      label += ` <span style="font-size:9px;opacity:0.7">(H${currentHypothesisNumber})</span>`;
    }
    return `<span class="${cls}" data-phase="${p}"${onclick}>${check}${label}</span>${arrow}`;
  }).join('');
}

// ── Phase Detail ──
function togglePhaseDetail(phase) {
  const row = document.getElementById('phase-detail-row');
  if (expandedPhase === phase) {
    expandedPhase = null;
    row.classList.remove('open');
    row.innerHTML = '';
    renderPipelineBar(currentPhaseGlobal);
    return;
  }
  expandedPhase = phase;
  row.innerHTML = '<div class="empty-state">Loading...</div>';
  row.classList.add('open');
  renderPipelineBar(currentPhaseGlobal);

  if (!selectedProject) {
    row.innerHTML = '<div class="empty-state">Select a project first</div>';
    return;
  }

  fetch(`/api/projects/${selectedProject}/phase-detail/${phase}`)
    .then(res => res.json())
    .then(data => renderPhaseDetail(data))
    .catch(() => { row.innerHTML = '<div class="empty-state">Failed to load phase details</div>'; });
}

function renderPhaseDetail(response) {
  const row = document.getElementById('phase-detail-row');
  if (response.status === 'future' || !response.data) {
    row.innerHTML = '<div class="empty-state">No data available for this phase yet</div>';
    return;
  }
  const header = buildPhaseHeader(response.phase, response.verdict);
  const renderer = PHASE_RENDERERS[response.phase];
  const body = renderer ? renderer(response.data) : '';
  row.innerHTML = header + body;
}

function buildPhaseHeader(phase, verdict) {
  let html = '<div class="phase-detail-header">';
  html += `<span class="phase-detail-title">${esc(phase)}</span>`;
  if (verdict) {
    const cls = verdict.decision.toLowerCase();
    html += `<span class="verdict-badge ${cls}">${esc(verdict.decision)}</span>`;
  }
  html += '</div>';
  if (verdict && verdict.rationale) {
    html += `<div style="font-size:12px;color:var(--text-dim);margin-bottom:12px">${esc(verdict.rationale)}</div>`;
  }
  if (verdict && verdict.issues && verdict.issues.length > 0) {
    html += '<div class="phase-detail-section"><div class="phase-detail-section-title">Issues</div><ul style="font-size:12px;padding-left:16px;color:var(--red)">';
    verdict.issues.forEach(issue => { html += `<li>${esc(issue)}</li>`; });
    html += '</ul></div>';
  }
  return html;
}

function renderCollapsible(title, content) {
  if (!content) return '';
  const id = 'col-' + Math.random().toString(36).slice(2, 8);
  return `<div class="phase-detail-section">
    <div class="phase-detail-section-title">${esc(title)}</div>

function renderBuildDetail(data) {
  let html = '';
  if (data.experiment_id != null) {
    html += `<div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">Experiment #${data.experiment_id}</div>`;
  }
  if (data.hypothesis) {
    html += `<div class="phase-detail-section"><div class="phase-detail-section-title">Hypothesis</div><div style="font-size:13px;font-weight:600;margin-bottom:8px">${esc(data.hypothesis)}</div></div>`;
  }
  if (data.diff) {
    const stats = data.diff_stats || {};
    const statsLine = `${stats.files_changed || 0} file(s), +${stats.insertions || 0}, -${stats.deletions || 0}`;
    html += `<div class="phase-detail-section"><div class="phase-detail-section-title">Changes <span style="font-weight:400;color:var(--text-dim);text-transform:none">${statsLine}</span></div><div class="phase-detail-pre" style="max-height:300px">${renderDiffLines(data.diff)}</div></div>`;
  }
  html += renderCollapsible('Agent Output', data.agent_output);
  return html;
}

function renderDiffLines(diff) {
  return diff.split('\n').map(line => {
    if (line.startsWith('+') && !line.startsWith('+++')) {
      return `<span style="color:var(--green)">${esc(line)}</span>`;
    } else if (line.startsWith('-') && !line.startsWith('---')) {
      return `<span style="color:var(--red)">${esc(line)}</span>`;
    } else if (line.startsWith('@@')) {
      return `<span style="color:var(--cyan)">${esc(line)}</span>`;
    } else if (line.startsWith('diff --git')) {
      return `<span style="color:var(--accent);font-weight:600">${esc(line)}</span>`;
    }
    return esc(line);
  }).join('\n');
}

function renderReviewDetail(data) {
  if (data.agent_output) {
    return `<div class="phase-detail-section"><div class="phase-detail-section-title">Review Output</div><div class="phase-detail-pre">${esc(data.agent_output)}</div></div>`;
  }
  return '<div class="empty-state">No review output available</div>';
}

function renderEvalDetail(data) {
  let html = '';
  if (data.experiment_id != null) {
    html += `<div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">Experiment #${data.experiment_id}</div>`;
  }

  const before = data.score_before;
  const after = data.score_after;
  if (before && after) {
    const delta = data.delta;
    const deltaStr = delta != null ? (delta >= 0 ? '+' : '') + delta.toFixed(4) : '';
    const deltaColor = delta != null ? (delta >= 0 ? 'var(--green)' : 'var(--red)') : '';
    html += `<div style="display:flex;gap:24px;align-items:center;margin-bottom:16px">`;
    html += `<div><div class="phase-detail-section-title">Before</div><div style="font-size:24px;font-weight:800;color:${scoreColor(before.total)}">${(before.total || 0).toFixed(3)}</div></div>`;
    html += `<div style="font-size:20px;color:var(--text-dim)">→</div>`;
    html += `<div><div class="phase-detail-section-title">After</div><div style="font-size:24px;font-weight:800;color:${scoreColor(after.total)}">${(after.total || 0).toFixed(3)}</div></div>`;
    if (deltaStr) {
      html += `<div style="font-size:18px;font-weight:700;color:${deltaColor}">${deltaStr}</div>`;
    }
    html += '</div>';

    // Dimension comparison table
    const beforeDims = before.results || [];
    const afterDims = after.results || [];
    if (beforeDims.length > 0) {
      html += '<table class="phase-detail-table"><thead><tr><th>Dimension</th><th>Before</th><th>After</th><th>Change</th></tr></thead><tbody>';
      afterDims.forEach(ad => {
        const bd = beforeDims.find(b => b.name === ad.name);
        const bScore = bd ? bd.score : 0;
        const change = ad.score - bScore;
        const changeStr = (change >= 0 ? '+' : '') + change.toFixed(3);
        const changeColor = change >= 0 ? 'var(--green)' : 'var(--red)';
        html += `<tr><td style="font-weight:600">${esc(ad.name)}</td>`;
        html += `<td>${bScore.toFixed(3)}</td>`;
        html += `<td>${ad.score.toFixed(3)}</td>`;
        html += `<td style="color:${changeColor}">${changeStr}</td></tr>`;
      });
      html += '</tbody></table>';
    }
  } else if (data.last_eval) {
    html += `<div><div class="phase-detail-section-title">Latest Score</div><div style="font-size:24px;font-weight:800">${(data.last_eval.total || 0).toFixed(3)}</div></div>`;
  }

  html += renderCollapsible('Agent Output', data.agent_output);
  return html;
}

function renderArchiveDetail(data) {

function openProjectDetails(name) {
  const row = document.getElementById('phase-detail-row');
  if (expandedPhase === '__project__' && selectedProject === name) {
    expandedPhase = null;
    row.classList.remove('open');
    row.innerHTML = '';
    renderPipelineBar(currentPhaseGlobal);

  }
  expandedPhase = '__project__';
  row.innerHTML = '<div class="empty-state">Loading...</div>';
  row.classList.add('open');
  renderPipelineBar(currentPhaseGlobal);

    .then(res => res.json())
    .then(data => renderProjectDetails(data))
    .catch(() => { row.innerHTML = '<div class="empty-state">Failed to load project details</div>'; });
}

    if (c.constraints && c.constraints.length > 0) html += `<dt>Constraints</dt><dd>${c.constraints.map(x => esc(x)).join('; ')}</dd>`;
    if (c.research_target) html += `<dt>Research Target</dt><dd>${esc(JSON.stringify(c.research_target))}</dd>`;
    html += '</dl></div>';

  // Eval profile

    const dims = ep.dimensions || [];

  // Performance report
  if (data.performance_report) {
    const rpt = data.performance_report;
    html += '<div class="phase-detail-section"><div class="phase-detail-section-title">Performance</div>';
    html += '<dl class="phase-detail-kv">';
    if (rpt.total_experiments != null) html += `<dt>Experiments</dt><dd>${rpt.total_experiments}</dd>`;

  }

  row.innerHTML = html;

// ── Agent Activity Cards ──
let agentDismissTimers = {};
let agentCardData = {};

function renderAgentCards(activeAgents) {
  const el = document.getElementById('agent-cards');
  const now = Date.now();

  for (const [role, info] of Object.entries(activeAgents)) {
    if (!agentCardData[role]) {
      agentCardData[role] = { ...info, active: true, completedAt: null };
    } else {
      agentCardData[role] = { ...agentCardData[role], ...info, active: true, completedAt: null };
    }
    if (agentDismissTimers[role]) {
      clearTimeout(agentDismissTimers[role]);
      delete agentDismissTimers[role];
    }
  }

  for (const role of Object.keys(agentCardData)) {
    if (!activeAgents[role] && agentCardData[role].active) {
      agentCardData[role].active = false;
      agentCardData[role].completedAt = now;
      agentDismissTimers[role] = setTimeout(() => {
        delete agentCardData[role];
        delete agentDismissTimers[role];
        renderAgentCardsDOM();
      }, 10000);
    }
  }

  renderAgentCardsDOM();
}

function renderAgentCardsDOM() {
  const el = document.getElementById('agent-cards');
  const entries = Object.entries(agentCardData);
  if (entries.length === 0) {
    el.innerHTML = '';
    return;
  }
  el.innerHTML = entries.map(([role, info]) => {
    const active = info.active;
    const cls = active ? 'agent-card' : 'agent-card done';
    return `
      <div class="${cls}" onclick="openAgentOutput('${esc(role)}')">
        <span class="pulse-dot"></span>
        <span class="agent-role">${esc(role)}</span>
        <span class="agent-task">${esc((info.task || '').substring(0, 100))}</span>
        <span class="agent-timer" data-started="${esc(info.started_at)}" data-active="${active}">${active ? '0s' : 'done'}</span>
      </div>`;
  }).join('');
}

setInterval(() => {
  document.querySelectorAll('.agent-timer[data-active="true"]').forEach(timer => {
    const started = timer.getAttribute('data-started');
    if (!started) return;
    const elapsed = Math.floor((Date.now() - new Date(started).getTime()) / 1000);
    if (elapsed < 60) timer.textContent = elapsed + 's';
    else timer.textContent = Math.floor(elapsed / 60) + 'm' + (elapsed % 60) + 's';
  });
}, 1000);

// ── Agent Output Panel ──
function openAgentOutput(role) {
  if (!selectedProject) return;
  const panel = document.getElementById('agent-output-panel');
  const title = document.getElementById('agent-output-title');
  const body = document.getElementById('agent-output-body');

}

function closeAgentOutput() {
  document.getElementById('agent-output-panel').classList.remove('open');
}

// ── Event Type Filters ──
let activeEventFilter = 'all';

const EVENT_FILTER_MAP = {
  agents: ['agent.started', 'agent.completed', 'agent.failed', 'agent.timeout'],
  evals: ['eval.started', 'eval.completed', 'guard.completed'],
  experiments: ['experiment.begin', 'experiment.finalize'],
  system: ['detect', 'discover.started', 'discover.completed', 'cycle.started', 'cycle.completed',
           'study.started', 'study.completed', 'insights.started', 'insights.completed',
           'ace.started', 'ace.completed', 'archive.completed'],
};

function initEventFilters() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeEventFilter = btn.dataset.filter;
      applyEventFilter();
    });
  });
}

function eventMatchesFilter(eventType) {
  if (activeEventFilter === 'all') return true;
  const types = EVENT_FILTER_MAP[activeEventFilter];
  return types ? types.includes(eventType) : true;
}

function applyEventFilter() {
  document.querySelectorAll('.event-item').forEach(item => {
    const type = item.dataset.eventType || '';
    item.style.display = eventMatchesFilter(type) ? '' : 'none';
  });
}

// ── Live State Polling ──
async function loadLiveState() {
  if (!selectedProject) return;
  try {
    const res = await fetch(`/api/projects/${selectedProject}/state`);
    const state = await res.json();
    const prevPhase = currentPhaseGlobal;
    currentPhaseGlobal = state.current_phase;

    if (state.phases && state.phases.length > 0) {
      currentPhases = state.phases;
    }
    if (state.loop_phases) {
      currentLoopPhases = state.loop_phases;
    }
    currentHypothesisNumber = state.hypothesis_number || 0;

    renderPipelineBar(state.current_phase);
    renderAgentCards(state.active_agents || {});
    updateModeIndicator(state.current_mode);
    loadProjects();

    if (expandedPhase && prevPhase !== currentPhaseGlobal) {
      fetch(`/api/projects/${selectedProject}/phase-detail/${expandedPhase}`)
        .then(r => r.json())
        .then(d => renderPhaseDetail(d))
        .catch(() => {});
    }
  } catch (e) {
    // Silently ignore — state endpoint may not have data yet
  }
}

// ── Init ──
loadProjects();
loadSummary();
connectSSE();
initToggle();
initEventFilters();
loadLiveState();
renderPipelineBar(null);
// Refresh projects every 10s
setInterval(() => {
  loadProjects();
  loadSummary();
  loadLiveState();
  if (selectedProject) loadExperiments(selectedProject);
}, 10000);
