name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Run tests with coverage
        run: uv run pytest -v --tb=short --cov=factory --cov-report=xml
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

  quality:
    runs-on: ubuntu-latest
    env:
      SENTRUX_VERSION: v0.5.7
    steps:
      - uses: actions/checkout@v4
      - name: Cache Sentrux
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/sentrux
            ~/.sentrux/plugins
          key: sentrux-${{ env.SENTRUX_VERSION }}-standard-plugins
      - name: Run Sentrux quality check
        continue-on-error: true
        run: ./scripts/sentrux-check.sh

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Ruff check
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy factory/
      - name: Check plugin agents in sync
        if: hashFiles('agents/') != ''
        run: uv run python scripts/sync_agents.py --check
